# cloudbuild.yaml for Next.js frontend deployment to Cloud Run.

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/gbusi-frontend-1:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/gbusi-frontend-1:latest'
      - '.'                     # build context = current directory (root)
    id: 'build-image'

  # Step 2: Push the image with the commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/gbusi-frontend-1:${SHORT_SHA}'
    id: 'push-image'
    waitFor:
      - 'build-image'

  # Step 3: Push the latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/gbusi-frontend-1:latest'
    id: 'push-latest'
    waitFor:
      - 'build-image'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'gbusi-frontend-1'                 # Cloud Run service name
      - '--image'
      - 'gcr.io/${PROJECT_ID}/gbusi-frontend-1:${SHORT_SHA}'
      - '--region'
      - 'asia-south1'                     # choose your region (Mumbai)
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'                            # Next.js can run with 512 MB
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--allow-unauthenticated'          # public access (remove if you need auth)
    id: 'deploy-cloud-run'
    waitFor:
      - 'push-image'

# Store the images in Container Registry (gcr.io)
images:
  - 'gcr.io/${PROJECT_ID}/gbusi-frontend-1:${SHORT_SHA}'
  - 'gcr.io/${PROJECT_ID}/gbusi-frontend-1:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY

# Timeout (adjust if your build takes longer)
timeout: '1200s'